name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop, feature/* ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cs2-images

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cs2_test
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        find . -maxdepth 2 -name "requirements.txt" -not -path "./requirements.txt" -exec pip install -r {} \;

    - name: Lint and Format check (Ruff)
      run: |
        ruff check .
        ruff format --check .

    - name: Type check (Mypy)
      run: mypy .

    - name: Run Tests with Coverage
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/cs2_test
      run: |
        pytest --cov=shared --cov=ingestion --cov=analysis --cov-report=xml --cov-report=term

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: code-coverage-report
        path: coverage.xml

  build-and-push:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Docker auth
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push Ingestion
        run: |
          docker build -t ${{ env.REGISTRY }}/ingestion:latest -f ingestion/Dockerfile .
          docker push ${{ env.REGISTRY }}/ingestion:latest

      - name: Build and push Analysis
        run: |
          docker build -t ${{ env.REGISTRY }}/analysis:latest -f analysis/Dockerfile .
          docker push ${{ env.REGISTRY }}/analysis:latest

      - name: Build and push Discord Bot
        run: |
          docker build -t ${{ env.REGISTRY }}/discord_bot:latest -f discord_bot/Dockerfile .
          docker push ${{ env.REGISTRY }}/discord_bot:latest

      - name: Build and push Inventory
        run: |
          docker build -t ${{ env.REGISTRY }}/inventory:latest -f inventory/Dockerfile .
          docker push ${{ env.REGISTRY }}/inventory:latest

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Google Auth for Deploy
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Copy deployment files to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,db/init.sql"
          target: "~/cs2-market-analyzer/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          REGISTRY_URL: ${{ env.REGISTRY }}
          GCP_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REGISTRY_URL,GCP_ACCESS_TOKEN
          script: |
            cd ~/cs2-market-analyzer
            
            # Przekazanie zmiennej REGISTRY_URL do środowiska
            export REGISTRY_URL=$REGISTRY_URL
            
            # Logowanie dockera z użyciem krótkotrwałego tokena
            echo "$GCP_ACCESS_TOKEN" | sudo docker login -u oauth2accesstoken --password-stdin ${{ secrets.GCP_REGION }}-docker.pkg.dev
            
            # Restart kontenerów z nowymi obrazami
            sudo REGISTRY_URL=$REGISTRY_URL docker compose -f docker-compose.prod.yml down
            sudo REGISTRY_URL=$REGISTRY_URL docker compose -f docker-compose.prod.yml pull
            sudo REGISTRY_URL=$REGISTRY_URL docker compose -f docker-compose.prod.yml up -d
            
            # Oczyszczenie dysku ze starych obrazów
            sudo docker image prune -f
