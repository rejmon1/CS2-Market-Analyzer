name: CI Pipeline

on:
  push:
    branches: [ main, master, develop, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cs2_test
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Instalacja zależności z modułów (jeśli są osobne pliki requirements)
        find . -maxdepth 2 -name "requirements.txt" -not -path "./requirements.txt" -exec pip install -r {} +

    - name: Lint and Format check (Ruff)
      run: |
        ruff check .
        ruff format --check .

    - name: Type check (Mypy)
      run: mypy . --ignore-missing-imports

    - name: Run Tests with Coverage
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/cs2_test
      run: |
        pytest --cov=shared --cov=ingestion --cov=analysis --cov-report=xml --cov-report=term

    - name: Upload coverage report
      uses: actions/upload-artifact@v3
      with:
        name: code-coverage-report
        path: coverage.xml
