services:
  ingestion:
    build: ./ingestion
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cs2user}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-cs2db}
      # Dodaj tu klucze API rynków, np.:
      # STEAM_API_KEY=${STEAM_API_KEY}
      # SKINPORT_API_KEY=${SKINPORT_API_KEY}
    depends_on:
      - db
    networks:
      - cs2net

  analysis:
    build: ./analysis
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cs2user}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-cs2db}
    depends_on:
      - db
    networks:
      - cs2net

  discord_bot:
    build: ./discord_bot
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cs2user}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-cs2db}
      # DISCORD_TOKEN=${DISCORD_TOKEN}
      # DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
    depends_on:
      - db
    networks:
      - cs2net

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cs2user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-cs2db}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - cs2net

volumes:
  db_data:

networks:
  cs2net:

