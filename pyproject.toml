[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "B", "I"]
ignore = []

[tool.pytest.ini_options]
testpaths = ["tests"]
# "."        — udostępnia pakiety shared/, analysis/, inventory/ z korzenia projektu.
# "ingestion" — udostępnia scheduler.py, config.py i fetchers/* z katalogu ingestion/
#               jako płaskie moduły (np. `import config`, `from fetchers.steam import ...`),
#               bo ingestion nie jest instalowanym pakietem, tylko samodzielnym serwisem.
pythonpath = [".", "ingestion"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.10"
explicit_package_bases = true
namespace_packages = true
ignore_missing_imports = true
check_untyped_defs = true
